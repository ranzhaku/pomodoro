<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- スマホ最適化（重要） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6347">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>ポモドーロタイマー</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background: #fff;
    }

    h1 {
      font-size: 6vw;
      margin-bottom: 10px;
    }

    #mode {
      font-size: 5vw;
      margin: 10px;
    }

    #time {
      font-size: 20vw; /* 画面いっぱい */
      font-weight: bold;
      margin: 10px;
    }

    button {
      font-size: 5vw;
      padding: 12px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      background: #ff6347;
      color: white;
    }

    #count {
      margin-top: 20px;
      font-size: 4vw;
    }

    #hint {
      margin-top: 10px;
      font-size: 3vw;
      color: #666;
    }
  </style>
</head>

<body>
  <h1>🍅 Pomodoro</h1>

  <div id="mode">作業時間</div>
  <div id="time">25:00</div>

  <button onclick="toggleTimer()">スタート / 一時停止</button>
  <button onclick="resetTimer()">リセット</button>

  <div id="count">完了したポモドーロ：0 回</div>
  <div id="hint">Space：開始/停止 ｜ R：リセット</div>

  <script>
    const WORK_TIME = 25 * 60;
    const SHORT_BREAK = 5 * 60;
    const LONG_BREAK = 20 * 60;

    let totalSeconds = WORK_TIME;
    let timer = null;
    let isWorkTime = true;
    let pomodoroCount = 0;

    // 🔔 音＋バイブ
    function playBeep() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.value = 880;
      gainNode.gain.value = 0.2;

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.4);

      if (navigator.vibrate) {
        navigator.vibrate(200);
      }
    }

    function updateDisplay() {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      document.getElementById("time").textContent =
        `${minutes}:${seconds.toString().padStart(2, "0")}`;
    }

    function startTimer() {
      if (timer) return;

      timer = setInterval(() => {
        totalSeconds--;
        updateDisplay();

        if (totalSeconds <= 0) {
          clearInterval(timer);
          timer = null;

          playBeep();

          if (isWorkTime) {
            pomodoroCount++;
            localStorage.setItem("pomodoroCount", pomodoroCount);

            document.getElementById("count").textContent =
              `完了したポモドーロ：${pomodoroCount} 回`;

            isWorkTime = false;

            if (pomodoroCount % 4 === 0) {
              totalSeconds = LONG_BREAK;
              document.getElementById("mode").textContent = "長休憩";
            } else {
              totalSeconds = SHORT_BREAK;
              document.getElementById("mode").textContent = "休憩時間";
            }
          } else {
            isWorkTime = true;
            totalSeconds = WORK_TIME;
            document.getElementById("mode").textContent = "作業時間";
          }

          updateDisplay();
          startTimer();
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
    }

    function toggleTimer() {
      if (timer) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      isWorkTime = true;
      totalSeconds = WORK_TIME;
      document.getElementById("mode").textContent = "作業時間";
      updateDisplay();
    }

    document.addEventListener("keydown", (e) => {
      if (e.repeat) return;

      if (e.key === " ") {
        e.preventDefault();
        toggleTimer();
      } else if (e.key.toLowerCase() === "r") {
        resetTimer();
      }
    });

    // 📊 保存データ読み込み
    window.onload = () => {
      const saved = localStorage.getItem("pomodoroCount");
      if (saved) {
        pomodoroCount = parseInt(saved);
        document.getElementById("count").textContent =
          `完了したポモドーロ：${pomodoroCount} 回`;
      }
      updateDisplay();
    };

    // 🔒 スリープ防止
    let wakeLock = null;
    async function keepScreenOn() {
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch (err) {}
    }
    document.addEventListener("click", keepScreenOn);

    // 📦 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
