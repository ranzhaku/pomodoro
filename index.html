<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff6347">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>ポモドーロタイマー</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      background: #fff;
    }

    h1 { font-size: 6vw; }

    #mode { font-size: 5vw; }
    #time { font-size: 20vw; font-weight: bold; }

    button {
      font-size: 5vw;
      padding: 12px 20px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      background: #ff6347;
      color: white;
    }

    #count, #weekCount {
      margin-top: 10px;
      font-size: 4vw;
    }
  </style>
</head>

<body>
  <h1>🍅 Pomodoro</h1>

  <div id="mode">作業時間</div>
  <div id="time">25:00</div>

  <button onclick="toggleTimer()">スタート / 一時停止</button>
  <button onclick="resetTimer()">リセット</button>

  <div id="count">今日：0回</div>
  <div id="weekCount">今週：0回</div>

  <script>
    const WORK_TIME = 25 * 60;
    const SHORT_BREAK = 5 * 60;
    const LONG_BREAK = 20 * 60;

    let totalSeconds = WORK_TIME;
    let timer = null;
    let isWorkTime = true;
    let pomodoroCount = 0;

    // 🔓 音アンロック
    let audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buffer = ctx.createBuffer(1, 1, 22050);
      const src = ctx.createBufferSource();
      src.buffer = buffer;
      src.connect(ctx.destination);
      src.start(0);
      audioUnlocked = true;
    }
    document.addEventListener("touchstart", unlockAudio, { once: true });
    document.addEventListener("click", unlockAudio, { once: true });

    function playBeep() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === "suspended") ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.frequency.value = 880;
      gain.gain.value = 0.3;

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + 0.5);

      if (navigator.vibrate) navigator.vibrate(200);
    }

    // 📅 今日キー
    function getTodayKey() {
      const d = new Date();
      return `pomodoro-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    }

    // 📅 月曜開始の週キー
    function getWeekKey() {
      const d = new Date();
      const day = d.getDay(); // 0=日曜
      const diff = (day === 0 ? -6 : 1 - day); // 月曜に戻す

      const monday = new Date(d);
      monday.setDate(d.getDate() + diff);

      return `week-${monday.getFullYear()}-${monday.getMonth()}-${monday.getDate()}`;
    }

    function updateDisplay() {
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      document.getElementById("time").textContent =
        `${m}:${s.toString().padStart(2, "0")}`;
    }

    function updateCounts() {
      const today = localStorage.getItem(getTodayKey()) || 0;
      const week = localStorage.getItem(getWeekKey()) || 0;

      document.getElementById("count").textContent = `今日：${today}回`;
      document.getElementById("weekCount").textContent = `今週：${week}回`;
    }

    function addCount() {
      // 今日
      let today = parseInt(localStorage.getItem(getTodayKey()) || 0);
      today++;
      localStorage.setItem(getTodayKey(), today);

      // 週
      let week = parseInt(localStorage.getItem(getWeekKey()) || 0);
      week++;
      localStorage.setItem(getWeekKey(), week);

      updateCounts();
    }

    function startTimer() {
      if (timer) return;

      timer = setInterval(() => {
        totalSeconds--;
        updateDisplay();

        if (totalSeconds <= 0) {
          clearInterval(timer);
          timer = null;

          playBeep();

          if (isWorkTime) {
            addCount();
            isWorkTime = false;

            totalSeconds =
              (parseInt(localStorage.getItem(getTodayKey()) || 0) % 4 === 0)
                ? LONG_BREAK
                : SHORT_BREAK;

            document.getElementById("mode").textContent =
              totalSeconds === LONG_BREAK ? "長休憩" : "休憩時間";
          } else {
            isWorkTime = true;
            totalSeconds = WORK_TIME;
            document.getElementById("mode").textContent = "作業時間";
          }

          updateDisplay();
          startTimer();
        }
      }, 1000);
    }

    function toggleTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      } else {
        startTimer();
      }
    }

    function resetTimer() {
      clearInterval(timer);
      timer = null;
      isWorkTime = true;
      totalSeconds = WORK_TIME;
      document.getElementById("mode").textContent = "作業時間";
      updateDisplay();
    }

    window.onload = () => {
      updateDisplay();
      updateCounts();
    };

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
